name: glass_curtain_wall_repair
description: 玻璃幕墙维修方案生成器 - 根据业主需求自动生成维修方案和预算

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # 状态管理
  provider: ^6.1.1
  # PDF生成
  pdf: ^3.10.7
  path_provider: ^2.1.2
  share_plus: ^7.2.2
  # 网络请求
  dio: ^5.4.0
  http: ^1.2.0
  # 本地存储
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  # 图片处理
  image_picker: ^1.0.7
  image: ^4.1.3
  # 权限管理
  permission_handler: ^11.3.0
  # 设备信息
  device_info_plus: ^9.1.2
  # 日期格式化
  intl: ^0.19.0
  # UI组件
  flutter_slidable: ^3.0.1
  fl_chart: ^0.66.0
  # 打印PDF
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.otf
        - asset: assets/fonts/NotoSansSC-Bold.otf
          weight: 700
